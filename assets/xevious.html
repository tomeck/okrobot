    ctx.shadowColor = isActive ? 'rgba(255,230,50,0.7)' : 'transparent';
    ctx.shadowBlur = isActive ? 8 : 0;
    ctx.fillStyle = isActive ? '#ffe632' : '#d0d0d0';
    ctx.fillText(hsName[i], cx, 178);
    if (isActive && ((Date.now() >> 8) & 1)) {
      ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
      ctx.fillStyle = '#ffe632';
      ctx.fillRect(cx - 7, 181, 14, 2);
    }
  }
  ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

  ctx.font = "8px -apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif";
  ctx.fillStyle = 'rgba(120,150,180,0.65)';
  ctx.fillText('UP/DOWN: CHANGE     Z: SELECT', GAME_W/2, 212);
}

// ============================================================
// 23. GAME STATE MACHINE
// ============================================================
let tick = 0;
let spawnIdx = 0;
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ';

function changeState(ns) {
  prevState = state;
  state = ns;
  stateTimer = 0;
}

function startGame() {
  score = 0;
  lives = 3;
  area = 1;
  scrollY = 0;
  scrollSpeed = SCROLL_SPEED;
  bossActive = false;
  currentBoss = null;
  enemies.clear();
  zapperShots.clear();
  blasterBombs.clear();
  giddoPool.clear();
  particles.clear();
  scorePopups.clear();
  for (const s of SPAWNS) s.spawned = false;
  for (const sc of solCitadels) {
    sc.revealed = false; sc.destroyed = false;
    sc.revealProgress = 0; sc.active = true;
  }
  for (const sf of specialFlags) { sf.collected = false; sf.active = true; }
  spawnIdx = 0;
  Player.reset();
  changeState(S.PLAYER_READY);
  Audio.startBGM();
  CockpitComms.start();
}

function update() {
  tick++;
  const inp = Input.get();

  // Global controls
  if (inp.mute) {
    const isMuted = Audio.toggleMute();
    document.getElementById('btn-mute').textContent = isMuted ? '♪' : '♫';
  }

  switch (state) {
    case S.ATTRACT:
      stateTimer++;
      // Attract terrain scroll
      scrollY += 0.6;
      if (inp.start) startGame();
      break;

    case S.PLAYER_READY:
      stateTimer++;
      if (stateTimer > 160) {
        // 70% checkpoint: if player died after 70% of current area, skip to next area
        if (!bossActive && area < NUM_AREAS) {
          const areaStart = (area - 1) * AREA_LEN;
          const progress = (Player.deathScrollY - areaStart) / AREA_LEN;
          if (progress >= 0.7) {
            area++;
            scrollY = (area - 1) * AREA_LEN;
            // Mark all spawns up to new scrollY as already spawned
            for (let i = 0; i < SPAWNS.length; i++) {
              if (SPAWNS[i].worldY < scrollY) { SPAWNS[i].spawned = true; spawnIdx = i + 1; }
              else break;
            }
          }
        }
        Player.reset();
        changeState(bossActive ? S.BOSS : S.PLAYING);
      }
      break;

    case S.PLAYING: {
      if (inp.pause) { changeState(S.PAUSED); break; }
      stateTimer++;

      // Scroll world
      scrollY += scrollSpeed;

      // Area tracking
      const newArea = Math.min(Math.floor(scrollY / AREA_LEN) + 1, NUM_AREAS);
      if (newArea !== area && newArea <= NUM_AREAS) {
        area = newArea;
        changeState(S.AREA_TRANS);
        break;
      }

      // Spawn enemies
      const viewBottom = scrollY + GAME_H + 40;
      for (let i = spawnIdx; i < SPAWNS.length; i++) {
        const sp = SPAWNS[i];
        if (sp.worldY > viewBottom) break;
        if (!sp.spawned) {
          sp.spawned = true;
          spawnIdx = i + 1;
          if (sp.isBoss) {
            currentBoss = new AndorGenesis(GAME_W/2, 80);
            bossActive = true;
            scrollSpeed = 0;
            changeState(S.BOSS);
            Audio.play('boss_appear');
            break;
          } else {
            const e = enemies.spawn(sp.type, sp.x, sp.worldY, sp.extra);
            if (e && !e.isGround) {
              // Air enemies enter from bottom of screen
              e.y = GAME_H + 10;
            }
          }
        }
      }

      // Update systems
      Player.update(inp);
      enemies.update();
      zapperShots.update();
      blasterBombs.update();
      giddoPool.update();
      particles.update();
      scorePopups.update();
      for (const sc of solCitadels) sc.update();
      for (const sf of specialFlags) sf.update();

      // Collisions
      if (!Player.dying) checkCollisions();

      // If all areas done: loop back
      if (scrollY >= TOTAL_H) {
        scrollY = 0;
        for (const sp of SPAWNS) sp.spawned = false;
        spawnIdx = 0;
        area = 1;
        changeState(S.AREA_TRANS);
      }
      break;
    }

    case S.BOSS: {
      if (inp.pause) { changeState(S.PAUSED); break; }
      stateTimer++;
      // No scrolling during boss
      Player.update(inp);
      enemies.update();
      zapperShots.update();
      blasterBombs.update();
      giddoPool.update();
      particles.update();
      scorePopups.update();
      if (!Player.dying) checkCollisions();
      if (currentBoss) {
        currentBoss.update();
        if (currentBoss.bragza) currentBoss.bragza.update();
      }
      break;
    }

    case S.AREA_TRANS:
      stateTimer++;
      scrollY += scrollSpeed;
      if (stateTimer > 90) changeState(S.PLAYING);
      break;

    case S.PAUSED:
      if (inp.pause || inp.start) changeState(prevState);
      break;

    case S.DYING:
      stateTimer++;
      particles.update();
      if (stateTimer > 80) {
        lives--;
        if (lives <= 0) changeState(S.GAME_OVER);
        else { Player.reset(); changeState(S.PLAYER_READY); }
      }
      break;

    case S.GAME_OVER:
      stateTimer++;
      particles.update();
      if (stateTimer > 200 || inp.start) {
        try { localStorage.setItem('xev_hi', JSON.stringify(hiScore)); } catch(e) {}
        if (score > 0 && score >= hiScore) {
          hsCursor = 0; hsName = ['A','A','A']; hsConfirmed = false;
          changeState(S.HI_SCORE);
        } else {
          changeState(S.ATTRACT);
        }
      }
      break;

    case S.HI_SCORE: {
      stateTimer++;
      const CHARS = ALPHABET;
      const idx = CHARS.indexOf(hsName[hsCursor]);
      if (inp.up) hsName[hsCursor] = CHARS[(idx + CHARS.length - 1) % CHARS.length];
      if (inp.down) hsName[hsCursor] = CHARS[(idx + 1) % CHARS.length];
      if (inp.start || inp.zap) {
        if (hsCursor < 2) hsCursor++;
        else {
          const initials = hsName.join('');
          try { localStorage.setItem('xev_hi', JSON.stringify(hiScore));
                localStorage.setItem('xev_initials', initials); } catch(e) {}
          changeState(S.ATTRACT);
        }
      }
      break;
    }
  }

  Input.endFrame();
}

// ============================================================
// 24. TERRAIN RENDERING
// ============================================================
function drawTerrain(ctx) {
  const firstChunk = Math.max(0, Math.floor(scrollY / CHUNK_H) - 1);
  const lastChunk  = Math.min(TOTAL_CHUNKS - 1, Math.ceil((scrollY + GAME_H) / CHUNK_H));
  for (let i = firstChunk; i <= lastChunk; i++) {
    ctx.drawImage(getChunk(i), 0, i * CHUNK_H - scrollY | 0);
  }
}

// ============================================================
// 25. MAIN RENDER
// ============================================================
function drawWater(ctx) {
  const t = tick * 0.016; // seconds
  for (let aIdx = 0; aIdx < NUM_AREAS; aIdx++) {
    const aWorldY = aIdx * AREA_LEN;
    for (const f of AREA_TERRAIN[aIdx].feats) {
      if (f.t !== 'river') continue;
      const wY1 = aWorldY + f.y;
      const sY1 = wY1 - scrollY, sY2 = sY1 + f.h;
      if (sY2 < 0 || sY1 > GAME_H) continue;
      const cY1 = Math.max(0, sY1) | 0, cY2 = Math.min(GAME_H, sY2) | 0;
      if (cY2 <= cY1) continue;

      ctx.save();
      ctx.beginPath(); ctx.rect(f.x, cY1, f.w, cY2 - cY1); ctx.clip();

      // Base: deep-to-light gradient across width (shallow banks, deep center)
      const grad = ctx.createLinearGradient(f.x, 0, f.x + f.w, 0);
      grad.addColorStop(0,    '#0d1c68');
      grad.addColorStop(0.12, '#162c88');
      grad.addColorStop(0.42, '#1d44b2');
      grad.addColorStop(0.58, '#2050c4');
      grad.addColorStop(0.88, '#162c88');
      grad.addColorStop(1,    '#0d1c68');
      ctx.fillStyle = grad;
      ctx.fillRect(f.x, cY1, f.w, cY2 - cY1);

      // Primary current lines — long compound waves flowing north
      ctx.lineWidth = 0.9;
      for (let sy = cY1; sy < cY2; sy += 4) {
        const wy = wY1 + (sy - sY1);
        const alpha = (0.22 + 0.12 * Math.sin(wy * 0.09 + t * 0.8)).toFixed(2);
        ctx.strokeStyle = `rgba(72,138,230,${alpha})`;
        ctx.beginPath();
        let first = true;
        for (let sx = f.x; sx <= f.x + f.w; sx += 2) {
          const dy = 1.6 * Math.sin(sx * 0.13 + wy * 0.033 - t * 1.8)
                   + 0.75 * Math.sin(sx * 0.21 + wy * 0.058 + t * 2.5);
          first ? (ctx.moveTo(sx, sy + dy), first = false) : ctx.lineTo(sx, sy + dy);
        }
        ctx.stroke();
      }

      // Fine surface ripples — faster, shorter wavelength
      ctx.lineWidth = 0.55;
      ctx.strokeStyle = 'rgba(120,185,255,0.18)';
      for (let sy = cY1 + 2; sy < cY2; sy += 3) {
        const wy = wY1 + (sy - sY1);
        ctx.beginPath();
        let first = true;
        for (let sx = f.x; sx <= f.x + f.w; sx += 2) {
          const dy = 0.55 * Math.sin(sx * 0.30 + wy * 0.08 + t * 3.6)
                   + 0.28 * Math.sin(sx * 0.19 - wy * 0.05 - t * 2.9);
          first ? (ctx.moveTo(sx, sy + dy), first = false) : ctx.lineTo(sx, sy + dy);
        }
        ctx.stroke();
      }

      // Diagonal cross-ripples — simulate wind-driven surface chop
      ctx.lineWidth = 0.5;
      ctx.strokeStyle = 'rgba(100,165,245,0.13)';
      for (let sy = cY1 + 1; sy < cY2; sy += 5) {
        const wy = wY1 + (sy - sY1);
        ctx.beginPath();
        let first = true;
        for (let sx = f.x; sx <= f.x + f.w; sx += 2) {
          const dy = 0.4 * Math.sin(sx * 0.09 + wy * 0.12 + t * 1.3)
                   + 0.3 * Math.sin(sx * 0.16 + wy * 0.07 - t * 2.1);
          first ? (ctx.moveTo(sx, sy + dy), first = false) : ctx.lineTo(sx, sy + dy);
        }
        ctx.stroke();
      }

      // Sunlight sparkle reflections
      const nSparks = Math.max(6, (f.w * f.h / 360) | 0);
      for (let s = 0; s < nSparks; s++) {
        const fx = f.x + 2 + (tnHash(s * 41 + 1, aIdx * 13 + f.y) * (f.w - 4)) | 0;
        const baseY = wY1 + tnHash(s * 29 + 2, aIdx * 17 + f.y) * f.h;
        const sy = baseY - scrollY + Math.sin(t * 2.6 + s * 1.9) * 1.5;
        if (sy < cY1 || sy > cY2) continue;
        const pulse = (Math.sin(t * 5.3 + s * 2.7) + 1) * 0.5;
        if (pulse < 0.42) continue;
        ctx.fillStyle = `rgba(200,232,255,${(pulse * 0.52).toFixed(2)})`;
        ctx.beginPath();
        ctx.ellipse(fx, sy, 2.2, 0.85, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Bank shadow fringe
      ctx.fillStyle = 'rgba(4,10,48,0.62)';
      ctx.fillRect(f.x, cY1, 2, cY2 - cY1);
      ctx.fillRect(f.x + f.w - 2, cY1, 2, cY2 - cY1);

      ctx.restore();
    }
  }
}

function render(ctx) {
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  // Terrain background (all states show scrolling terrain)
  drawTerrain(ctx);
  drawWater(ctx);

  if (state === S.ATTRACT) {
    drawAttract(ctx, tick);
    drawHUD(ctx);
    return;
  }

  // Sol citadels (below player, on terrain)
  for (const sc of solCitadels) sc.draw(ctx);

  // Special flags
  for (const sf of specialFlags) sf.draw(ctx);

  // Ground enemies (on terrain, below air layer)
  for (const e of enemies.active) {
    if (e.isGround) e.draw(ctx);
  }

  // Blaster reticle (on terrain, above ground enemies)
  if (state === S.PLAYING || state === S.BOSS) Player.drawReticle(ctx);

  // Blaster bombs
  blasterBombs.draw(ctx);

  // Air enemies
  for (const e of enemies.active) {
    if (!e.isGround) e.draw(ctx);
  }

  // Zapper shots
  zapperShots.draw(ctx);

  // Enemy bullets
  giddoPool.draw(ctx);

  // Player ship
  if (state !== S.PLAYER_READY) Player.draw(ctx);

  // Boss
  if (currentBoss) currentBoss.draw(ctx);

  // Particles & score popups
  particles.draw(ctx);
  scorePopups.draw(ctx);

  // Screen-edge vignette
  const vig = ctx.createRadialGradient(GAME_W/2, GAME_H/2, 60, GAME_W/2, GAME_H/2, 175);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,8,0.38)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // HUD
  drawHUD(ctx);

  // State overlays
  if (state === S.PLAYER_READY) drawPlayerReady(ctx);
  if (state === S.AREA_TRANS) drawAreaTransition(ctx);
  if (state === S.PAUSED) drawPaused(ctx);
  if (state === S.GAME_OVER) drawGameOver(ctx);
  if (state === S.HI_SCORE) {
    const inp = Input.get();
    drawHiScore(ctx, inp);
  }
}

// ============================================================
// 26. CANVAS SETUP & SCALING
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = GAME_W;
canvas.height = GAME_H;
ctx.imageSmoothingEnabled = false;

function scaleCanvas() {
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const ctrlH = isMobile ? 165 : 0;
  const availW = window.innerWidth;
  const availH = window.innerHeight - ctrlH;
  const scaleX = availW / GAME_W;
  const scaleY = availH / GAME_H;
  const scale = Math.min(scaleX, scaleY, 3);
  canvas.style.width  = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
  // Center vertically in available space
  const topOffset = Math.max(0, (availH - GAME_H * scale) / 2);
  canvas.style.marginTop = topOffset + 'px';
}

scaleCanvas();
window.addEventListener('resize', scaleCanvas);
window.addEventListener('orientationchange', () => setTimeout(scaleCanvas, 150));

// ============================================================
// 27. GAME LOOP
// ============================================================
let lastTime = 0, accumulator = 0;

function loop(timestamp) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = timestamp; return; }
  const delta = Math.min(timestamp - lastTime, 80);
  lastTime = timestamp;
  accumulator += delta;

  let ticks = 0;
  while (accumulator >= TICK_RATE && ticks < 4) {
    update();
    accumulator -= TICK_RATE;
    ticks++;
  }
  if (ticks > 0) render(ctx);
}

// Resume audio context on first interaction
document.addEventListener('click', () => Audio.resume(), {once:true});
document.addEventListener('touchstart', () => Audio.resume(), {once:true});
document.addEventListener('keydown', () => Audio.resume(), {once:true});

// Tap anywhere on canvas to start game (mobile-friendly)
canvas.addEventListener('click', () => {
  if (state === S.ATTRACT) startGame();
});
canvas.addEventListener('touchstart', e => {
  if (state === S.ATTRACT) { e.preventDefault(); startGame(); }
}, {passive: false});

requestAnimationFrame(loop);
</script>
