<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — OK ROBOT</title>
<link rel="icon" type="image/png" href="images/ok_robot_logo_400.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&family=Instrument+Serif&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-subtle: #111111;
    --text-primary: #e8e8e8;
    --text-secondary: #888888;
    --text-dim: #555555;
    --accent: #00ff88;
    --accent-dim: #00ff8822;
    --accent-glow: #00ff8844;
    --border: #1a1a1a;
    --font-display: 'Outfit', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 116%;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--text-dim) var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-display);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- NAVIGATION ---- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  }

  .nav-logo {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .nav-logo a { text-decoration: none; }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-left: 2.5rem;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--accent); }
  .nav-links a.active { color: var(--accent); }

  /* ---- PAGE CONTENT ---- */
  .page-content {
    max-width: 760px;
    margin: 0 auto;
    padding: 8rem 3rem 4rem;
  }

  /* ---- BACK LINK ---- */
  .back-link {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 2.5rem;
    transition: opacity 0.3s;
  }

  .back-link:hover { opacity: 0.7; }

  /* ---- POST HEADER ---- */
  .post-header { margin-bottom: 3rem; }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .post-meta-date { color: var(--text-secondary); }

  .post-meta-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
  }

  .post-title {
    font-weight: 900;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: -0.03em;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }

  .post-description {
    font-size: 1.05rem;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
  }

  /* ---- ARTICLE BODY (rendered markdown) ---- */
  .post-body {
    line-height: 1.8;
    font-size: 0.95rem;
    color: var(--text-primary);
  }

  .post-body h1 { display: none; }

  .post-body h2 {
    font-weight: 700;
    font-size: 1.4rem;
    color: #ffffff;
    margin: 2.5rem 0 1rem;
    letter-spacing: -0.02em;
  }

  .post-body h3 {
    font-weight: 700;
    font-size: 1.1rem;
    color: #ffffff;
    margin: 2rem 0 0.75rem;
  }

  .post-body h4 {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin: 1.5rem 0 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .post-body p {
    margin-bottom: 1.25rem;
  }

  .post-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-dim);
    transition: border-color 0.3s;
  }

  .post-body a:hover {
    border-color: var(--accent);
  }

  .post-body strong { color: #ffffff; }

  .post-body em { font-style: italic; }

  .post-body ul, .post-body ol {
    margin: 1rem 0 1.5rem 1.5rem;
  }

  .post-body li {
    margin-bottom: 0.5rem;
    line-height: 1.7;
  }

  .post-body li::marker {
    color: var(--accent);
  }

  .post-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 1rem 1.5rem;
    margin: 1.5rem 0;
    background: var(--bg-subtle);
    border-radius: 0 4px 4px 0;
    font-style: italic;
    color: var(--text-secondary);
  }

  .post-body blockquote p { margin-bottom: 0; }

  .post-body code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    color: var(--accent);
  }

  .post-body pre {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 0;
    overflow-x: auto;
  }

  .post-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-primary);
  }

  .post-body img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 1.5rem 0;
  }

  .post-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2.5rem 0;
  }

  .post-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.88rem;
  }

  .post-body th, .post-body td {
    border: 1px solid var(--border);
    padding: 0.6rem 1rem;
    text-align: left;
  }

  .post-body th {
    background: var(--bg-subtle);
    color: #ffffff;
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ---- LOADING / ERROR ---- */
  .post-loading, .post-error {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* ---- FOOTER ---- */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4rem;
  }

  footer a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s;
  }

  footer a:hover { color: var(--accent); }

  /* ---- HAMBURGER ---- */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 101;
  }

  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text-secondary);
    margin: 5px 0;
    transition: all 0.3s;
  }

  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ---- MOBILE ---- */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .hamburger { display: block; }
    .nav-links {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 100;
    }
    .nav-links.open { display: flex; }
    .nav-links a { margin-left: 0; font-size: 1.2rem; }
    .page-content { padding: 6rem 1.5rem 3rem; }
    footer {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem 1.5rem;
    }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><a href="index.html"><img src="images/ok_robot_logo_400.png" alt="OK ROBOT" style="height:70px;vertical-align:middle;background:#181818;border-radius:6px;padding:4px;"></a></div>
  <button class="hamburger" onclick="this.classList.toggle('active');document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#mission">Mission</a>
    <a href="index.html#principles">Principles</a>
    <a href="samples.html">Samples</a>
    <a href="blog.html" class="active">Blog</a>
    <a href="index.html#team">Team</a>
    <a href="index.html#cta">Contact</a>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="page-content">
  <a href="blog.html" class="back-link">&larr; All Posts</a>

  <div id="postContainer">
    <div class="post-loading">Loading post...</div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>&copy; 2026 OK ROBOT LLC. All rights reserved.</div>
  <div><a href="mailto:okrobot@bio-teck.com">okrobot@bio-teck.com</a></div>
</footer>

<script>
(async function() {
  var container = document.getElementById('postContainer');
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('post');

  if (!slug) {
    container.innerHTML = '<div class="post-error">No post specified. <a href="blog.html" style="color:var(--accent)">Back to blog</a></div>';
    return;
  }

  try {
    var indexRes = await fetch('blog/posts/index.json');
    var posts = await indexRes.json();
    var post = posts.find(function(p) { return p.slug === slug; });

    if (!post) {
      container.innerHTML = '<div class="post-error">Post not found. <a href="blog.html" style="color:var(--accent)">Back to blog</a></div>';
      return;
    }

    document.title = post.title + ' — OK ROBOT';

    var mdRes = await fetch('blog/posts/' + encodeURIComponent(slug) + '.md');
    if (!mdRes.ok) {
      container.innerHTML = '<div class="post-error">Could not load post content. <a href="blog.html" style="color:var(--accent)">Back to blog</a></div>';
      return;
    }

    var markdown = await mdRes.text();
    var html = marked.parse(markdown);

    var dateObj = new Date(post.date + 'T00:00:00');
    var dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

    var tagsHtml = '';
    if (post.tags && post.tags.length) {
      tagsHtml = post.tags.map(function(t) {
        return '<span class="post-meta-tag">' + t + '</span>';
      }).join(' ');
    }

    container.innerHTML =
      '<div class="post-header">' +
        '<div class="post-meta">' +
          '<span class="post-meta-date">' + dateStr + '</span>' +
          (post.author ? '<span>' + post.author + '</span>' : '') +
          tagsHtml +
        '</div>' +
        '<h1 class="post-title">' + post.title + '</h1>' +
        '<p class="post-description">' + post.description + '</p>' +
      '</div>' +
      '<div class="post-body">' + html + '</div>';

  } catch (e) {
    container.innerHTML = '<div class="post-error">Something went wrong loading this post. <a href="blog.html" style="color:var(--accent)">Back to blog</a></div>';
  }
})();
</script>

</body>
</html>
