<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravitational Context Fields</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-surface: #12121a;
  --bg-elevated: #1a1a26;
  --text-primary: #e0ddd5;
  --text-secondary: #8a8780;
  --text-dim: #4a4845;
  --accent: #c8a2ff;
  --accent-dim: #c8a2ff22;
  --accent-glow: #c8a2ff44;
  --accent-warm: #ffb088;
  --focal-color: #ffd700;
  --focal-glow: #ffd70044;
  --border: #222230;
  --border-light: #2a2a3a;
  --danger: #ff6b6b;
  --font-serif: 'Instrument Serif', serif;
  --font-mono: 'DM Mono', monospace;
  --node-radius: 6px;
  --shadow-soft: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px var(--accent-dim);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── Canvas layers ── */
#canvas-container {
  position: absolute;
  inset: 0;
  overflow: hidden;
  cursor: grab;
}

#canvas-container.grabbing { cursor: grabbing; }
#canvas-container.node-hover { cursor: grab; }

#grid-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#connection-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#node-layer {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  transform-origin: 0 0;
}

/* ── Nodes ── */
.node {
  position: absolute;
  width: 220px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--node-radius);
  padding: 12px 14px;
  cursor: grab;
  transition: box-shadow 0.3s ease, border-color 0.3s ease;
  will-change: transform;
}

.node:hover {
  border-color: var(--border-light);
  box-shadow: var(--shadow-soft);
  z-index: 10;
}

.node.dragging {
  cursor: grabbing;
  box-shadow: var(--shadow-glow);
  border-color: var(--accent);
  z-index: 100;
  transition: none;
}

.node.focal {
  border-color: var(--focal-color);
  box-shadow: 0 0 25px var(--focal-glow), 0 0 60px rgba(255, 215, 0, 0.1);
}

.node .title {
  font-family: var(--font-serif);
  font-size: 17px;
  color: var(--text-primary);
  outline: none;
  min-height: 1.3em;
  line-height: 1.3;
  cursor: text;
}

.node .title:empty::before {
  content: 'Untitled';
  color: var(--text-dim);
}

.node .body {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  outline: none;
  min-height: 1em;
  margin-top: 6px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  cursor: text;
  max-height: 120px;
  overflow-y: auto;
}

.node .body:empty::before {
  content: 'Write something...';
  color: var(--text-dim);
}

.node .body::-webkit-scrollbar { width: 3px; }
.node .body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

.node .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.node .context-weight-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 8px;
  overflow: hidden;
}

.node .context-weight-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.5s ease;
}

.node .mass-indicator {
  position: absolute;
  inset: -1px;
  border-radius: var(--node-radius);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
  background: radial-gradient(ellipse at center, var(--accent-dim) 0%, transparent 70%);
}

.node:hover .mass-indicator,
.node.focal .mass-indicator { opacity: 1; }

.node .node-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.node:hover .node-actions { opacity: 1; }

/* ── Connector handles (Visio-style) ── */
.connector-handle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--text-dim);
  border-radius: 50%;
  cursor: crosshair;
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s, border-color 0.15s, background 0.15s;
  z-index: 20;
  pointer-events: auto;
}

.node:hover .connector-handle { opacity: 1; }
.connecting-active .node .connector-handle { opacity: 0.7; }
.connecting-active .node .connector-handle.drop-target-active {
  opacity: 1;
  border-color: var(--accent);
  background: var(--accent);
  transform: translate(-50%, -50%) scale(1.6);
  box-shadow: 0 0 10px var(--accent-glow);
}

.connector-handle.dragging-source {
  opacity: 1;
  border-color: var(--accent);
  background: var(--accent);
  transform: translate(-50%, -50%) scale(1.4);
}

.connector-handle.top    { top: 0; left: 50%; transform: translate(-50%, -50%); }
.connector-handle.right  { top: 50%; right: 0; transform: translate(50%, -50%); }
.connector-handle.bottom { bottom: 0; left: 50%; transform: translate(-50%, 50%); }
.connector-handle.left   { top: 50%; left: 0; transform: translate(-50%, -50%); }

/* Override transforms when active */
.connector-handle.top.drop-target-active    { transform: translate(-50%, -50%) scale(1.6); }
.connector-handle.right.drop-target-active  { transform: translate(50%, -50%) scale(1.6); }
.connector-handle.bottom.drop-target-active { transform: translate(-50%, 50%) scale(1.6); }
.connector-handle.left.drop-target-active   { transform: translate(-50%, -50%) scale(1.6); }

/* Arrow animation */
@keyframes draw-arrow {
  from { stroke-dashoffset: var(--arrow-length); }
  to   { stroke-dashoffset: 0; }
}

.edge-line.animating {
  animation: draw-arrow 0.4s ease-out forwards;
}

/* ── Edge context menu ── */
#edge-menu {
  position: fixed;
  display: none;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 4px;
  z-index: 400;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  min-width: 130px;
}

#edge-menu.open { display: block; }

.edge-menu-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  border-radius: 4px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  transition: background 0.1s, color 0.1s;
}

.edge-menu-item:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.edge-menu-item.danger:hover {
  background: rgba(255,107,107,0.1);
  color: var(--danger);
}

.edge-menu-item .menu-icon {
  font-size: 13px;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}

.edge-menu-field {
  padding: 6px 10px;
}

.edge-menu-field-label {
  display: block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.edge-menu-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  transition: border-color 0.15s;
}

.edge-menu-input:focus { border-color: var(--accent); }

.edge-menu-input[type="number"] {
  -moz-appearance: textfield;
  width: 70px;
}

.edge-menu-input[type="number"]::-webkit-inner-spin-button,
.edge-menu-input[type="number"]::-webkit-outer-spin-button {
  opacity: 1;
}

.edge-menu-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}

/* Edge label on canvas */
.edge-label {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--accent);
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  letter-spacing: 0.3px;
  border: 1px solid var(--border);
}

.node-action-btn {
  width: 20px;
  height: 20px;
  border: none;
  background: var(--bg-elevated);
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}

.node-action-btn:hover {
  color: var(--text-primary);
  background: var(--border-light);
}

.node-action-btn.delete:hover {
  color: var(--danger);
}

/* ── HUD ── */
#hud {
  position: fixed;
  top: 20px;
  left: 24px;
  pointer-events: none;
  z-index: 200;
}

#hud h1 {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}

#hud .subtitle {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Controls toolbar ── */
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  z-index: 200;
}

.ctrl-btn {
  padding: 8px 14px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.ctrl-btn:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.ctrl-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.ctrl-btn .icon { margin-right: 4px; }

/* ── Save indicator ── */
#save-indicator {
  position: fixed;
  top: 24px;
  right: 24px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 6px;
}

#save-indicator .dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s;
}

#save-indicator .dot.pulse {
  opacity: 1;
  animation: save-pulse 1s ease-out;
}

@keyframes save-pulse {
  0% { opacity: 1; transform: scale(1.3); }
  100% { opacity: 0; transform: scale(1); }
}

/* ── Context sidebar ── */
#context-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 260px;
  height: 100%;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  z-index: 150;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#context-panel.open { transform: translateX(0); }

#context-panel .panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#context-panel .panel-close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
}

#context-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.context-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.context-item:hover { background: var(--bg-elevated); }

.context-item.focal { color: var(--focal-color); }

.context-item .weight-bar {
  width: 40px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  flex-shrink: 0;
  overflow: hidden;
}

.context-item .weight-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}

.context-item.focal .weight-bar .fill { background: var(--focal-color); }

.context-item .ctx-title {
  flex: 1;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.context-item .ctx-weight {
  font-size: 9px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* ── Conversation panel ── */
#conversation-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 380px;
  height: 100%;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  z-index: 160;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
}

#conversation-panel.open { transform: translateX(0); }

#conversation-panel .panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#conversation-panel .panel-header .focal-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

#conversation-panel .panel-header .focal-name {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--focal-color);
  margin-top: 2px;
}

#conversation-panel .panel-close {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

.message {
  max-width: 90%;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.user {
  align-self: flex-end;
  background: var(--accent-dim);
  color: var(--text-primary);
  border-bottom-right-radius: 2px;
}

.message.assistant {
  align-self: flex-start;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border-bottom-left-radius: 2px;
}

.message.typing {
  color: var(--text-dim);
  font-style: italic;
}

#chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

#chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
  resize: none;
  min-height: 40px;
  max-height: 120px;
}

#chat-input:focus { border-color: var(--accent); }

#chat-send {
  padding: 10px 16px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
  align-self: flex-end;
}

#chat-send:hover { background: var(--accent-glow); }

/* ── Minimap ── */
#minimap {
  position: fixed;
  bottom: 60px;
  right: 16px;
  width: 160px;
  height: 100px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  z-index: 200;
  cursor: pointer;
}

#minimap canvas {
  width: 100%;
  height: 100%;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 6px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Keyboard hint ── */
#keyboard-hint {
  position: fixed;
  bottom: 60px;
  left: 24px;
  font-size: 9px;
  color: var(--text-dim);
  line-height: 1.8;
  z-index: 200;
  pointer-events: none;
  opacity: 0.6;
}

kbd {
  display: inline-block;
  padding: 1px 5px;
  border: 1px solid var(--border-light);
  border-radius: 3px;
  font-size: 9px;
  font-family: var(--font-mono);
}
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="grid-canvas"></canvas>
  <svg id="connection-svg"></svg>
  <div id="node-layer"></div>
</div>

<div id="hud">
  <h1>Gravitational Context Fields</h1>
  <div class="subtitle">Double-click to create &middot; Right-click to set focal point</div>
</div>

<div id="save-indicator">
  <div class="dot"></div>
  <span>saved</span>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="fitAllNodes()" title="Fit all nodes in view"><span class="icon">&#9635;</span> Fit</button>
  <button class="ctrl-btn" onclick="addNodeAtCenter()" title="Add new node"><span class="icon">+</span> Node</button>
  <button class="ctrl-btn" id="btn-physics" onclick="togglePhysics()" title="Toggle physics simulation"><span class="icon">&#9654;</span> Physics</button>
  <button class="ctrl-btn" id="btn-grid" onclick="toggleGrid()" title="Toggle grid distortion"><span class="icon">&#9638;</span> Grid</button>
  <button class="ctrl-btn" id="btn-context" onclick="toggleContextPanel()" title="Show context weights"><span class="icon">&#9776;</span> Context</button>
  <button class="ctrl-btn" id="btn-chat" onclick="toggleConversationPanel()" title="AI conversation"><span class="icon">&#9993;</span> Chat</button>
</div>

<div id="context-panel">
  <div class="panel-header">
    <span>Context Weights</span>
    <button class="panel-close" onclick="toggleContextPanel()">&times;</button>
  </div>
  <div id="context-list"></div>
</div>

<div id="conversation-panel">
  <div class="panel-header">
    <div>
      <div class="focal-label">Conversation with</div>
      <div class="focal-name" id="conv-focal-name">No focal node</div>
    </div>
    <button class="panel-close" onclick="toggleConversationPanel()">&times;</button>
  </div>
  <div id="messages"></div>
  <div id="chat-input-area">
    <textarea id="chat-input" rows="1" placeholder="Ask about your canvas..."></textarea>
    <button id="chat-send" onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas"></canvas>
</div>

<div id="keyboard-hint">
  <kbd>Dbl-click</kbd> new node &middot;
  <kbd>Right-click</kbd> focal &middot;
  <kbd>Ctrl+0</kbd> fit &middot;
  <kbd>Del</kbd> remove &middot;
  <kbd>Ctrl+S</kbd> save
</div>

<div id="edge-menu">
  <div class="edge-menu-field">
    <label class="edge-menu-field-label" for="edge-menu-label">Label</label>
    <input id="edge-menu-label" type="text" class="edge-menu-input" placeholder="optional" />
  </div>
  <div class="edge-menu-field">
    <label class="edge-menu-field-label" for="edge-menu-weight">Weight</label>
    <input id="edge-menu-weight" type="number" class="edge-menu-input" min="1" step="1" value="10" required />
  </div>
  <div class="edge-menu-divider"></div>
  <button class="edge-menu-item danger" data-action="delete">
    <span class="menu-icon">&times;</span> Delete
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG & CONSTANTS
// ═══════════════════════════════════════════════════════

const CONFIG = {
  G: 800,
  SOFTENING: 400,
  DAMPING: 0.97,
  DT: 0.016,
  MAX_FORCE: 5,
  MIN_SEPARATION: 60,
  GRAVITY_RADIUS: 500,
  BASE_MASS: 2,
  MAX_EXPECTED_MASS: 20,
  GRID_SPACING: 50,
  GRID_DISTORTION_STRENGTH: 18,
  GRID_DISTORTION_RADIUS: 250,
  CONNECTION_DISTANCE: 350,
  DRAG_HISTORY_SIZE: 5,
  AUTO_SAVE_DELAY: 2000,
  TOKEN_BUDGET: 6000,
  CHARS_PER_TOKEN: 4,
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════

const state = {
  nodes: [],
  edges: [],

// ═══════════════════════════════════════════════════════
//  COORDINATE TRANSFORMS
// ═══════════════════════════════════════════════════════

function worldToScreen(wx, wy) {
  return {
    x: wx * view.scale + view.x,
    y: wy * view.scale + view.y,
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - view.x) / view.scale,
    y: (sy - view.y) / view.scale,
  };
}

// ═══════════════════════════════════════════════════════
//  NODE MANAGEMENT
// ═══════════════════════════════════════════════════════

let nodeIdCounter = 0;

function createNode(x, y, title = '', body = '') {
  const id = 'n_' + Date.now() + '_' + (nodeIdCounter++);
  const node = {
    id,
    x, y,
    prevX: x,
    prevY: y,
    pinned: false,
    baseMass: Math.floor(Math.random() * 100) + 1,
    mass: 0,
    title: title || '',
    body: body || '',
    references: 0,
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
  state.nodes.push(node);
  renderNodeDOM(node);
  recomputeMasses();
  scheduleSave();
  return node;
}

function deleteNode(id) {
  const idx = state.nodes.findIndex(n => n.id === id);
  if (idx === -1) return;
  state.nodes.splice(idx, 1);
  // Remove all edges involving this node
  state.edges = state.edges.filter(e => e.from !== id && e.to !== id);
  const el = document.getElementById(id);
  if (el) el.remove();
  if (state.focalNodeId === id) state.focalNodeId = null;
  recomputeMasses();
  scheduleSave();
}

function setFocalNode(id) {
  state.focalNodeId = id;
  const node = state.nodes.find(n => n.id === id);
  if (node) node.references++;
  updateFocalDisplay();
  updateContextWeights();
  scheduleSave();
}

function getNode(id) {
  return state.nodes.find(n => n.id === id);
}

// ═══════════════════════════════════════════════════════
//  MASS COMPUTATION
// ═══════════════════════════════════════════════════════

function computeMass(node) {
  const textMass = (node.title.length + node.body.length) / 50;
  const connectionMass = countNearbyNodes(node, CONFIG.GRAVITY_RADIUS) * 0.8;
  const refMass = node.references * 0.5;
  const age = (Date.now() - node.createdAt) / (1000 * 60 * 60 * 24);
  const ageMass = Math.min(age * 0.1, 1.0);
  return node.baseMass + textMass + connectionMass + refMass + ageMass;
}

function countNearbyNodes(node, radius) {
  let count = 0;
  for (const other of state.nodes) {
    if (other.id === node.id) continue;
    const dx = other.x - node.x;
    const dy = other.y - node.y;
    if (dx * dx + dy * dy < radius * radius) count++;
  }
  return count;
}

function recomputeMasses() {
  // Step 1: compute base masses from node properties
  for (const node of state.nodes) {
    node.mass = computeMass(node);
  }

  // Step 2: propagate edge weights via BFS from focal node
  propagateEdgeWeights();
}

function propagateEdgeWeights() {
  const focalNode = getNode(state.focalNodeId);
  if (!focalNode || state.edges.length === 0) return;

  // Snapshot masses before propagation (computed from computeMass)
  const baseMasses = {};
  for (const node of state.nodes) {
    baseMasses[node.id] = node.mass;
  }

  // BFS from focal node, treating edges as undirected for traversal
  // but computing val using directed from→to
  const accum = {};       // nodeId → sum of incoming vals
  const visitedEdges = new Set();
  const visitedNodes = new Set();
  const queue = [focalNode.id];
  visitedNodes.add(focalNode.id);

  while (queue.length > 0) {
    const nodeId = queue.shift();

    for (const edge of state.edges) {
      if (visitedEdges.has(edge.id)) continue;

      // Check if this edge touches the current node
      let neighborId = null;
      if (edge.from === nodeId) neighborId = edge.to;
      else if (edge.to === nodeId) neighborId = edge.from;
      else continue;

      // Mark edge visited (once only)
      visitedEdges.add(edge.id);

      // val = source node's mass * edge weight → attributed to destination
      const fromMass = baseMasses[edge.from] || 0;
      if (!accum[edge.to]) accum[edge.to] = 0;
      accum[edge.to] += fromMass * edge.weight;

      // Enqueue neighbor for further traversal
      if (!visitedNodes.has(neighborId)) {
        visitedNodes.add(neighborId);
        queue.push(neighborId);
      }
    }
  }

  // Update: nodes with incoming edge vals get mass = sum of weighted edges
  for (const node of state.nodes) {
    if (accum[node.id] !== undefined) {
      node.mass = accum[node.id];
    }
  }
}

// ═══════════════════════════════════════════════════════
//  PHYSICS — VERLET INTEGRATION
// ═══════════════════════════════════════════════════════

function physicsTick() {
  if (!physicsEnabled) return;
  const nodes = state.nodes;
  const n = nodes.length;

  // Accumulate gravitational forces
  for (let i = 0; i < n; i++) {
    const a = nodes[i];
    if (a.pinned) continue;

    let ax = 0, ay = 0;

    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const b = nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const distSq = dx * dx + dy * dy + CONFIG.SOFTENING;
      const dist = Math.sqrt(distSq);
      let force = CONFIG.G * (a.mass * b.mass) / distSq;
      force = Math.min(force, CONFIG.MAX_FORCE);
      ax += (dx / dist) * force / a.mass;
      ay += (dy / dist) * force / a.mass;
    }

    // Verlet integration
    const vx = (a.x - a.prevX) * CONFIG.DAMPING;
    const vy = (a.y - a.prevY) * CONFIG.DAMPING;
    a.prevX = a.x;
    a.prevY = a.y;
    a.x += vx + ax * CONFIG.DT * CONFIG.DT;
    a.y += vy + ay * CONFIG.DT * CONFIG.DT;
  }

  // Constraint: minimum separation
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.MIN_SEPARATION && dist > 0) {
        const overlap = (CONFIG.MIN_SEPARATION - dist) / 2;
        const nx = dx / dist;
        const ny = dy / dist;
        if (!a.pinned) { a.x -= nx * overlap; a.y -= ny * overlap; }
        if (!b.pinned) { b.x += nx * overlap; b.y += ny * overlap; }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
//  RENDERING — GRID
// ═══════════════════════════════════════════════════════

function resizeCanvases() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  gridCanvas.width = w;
  gridCanvas.height = h;
  minimapCanvas.width = 160;
  minimapCanvas.height = 100;
}

function drawGrid() {
  const ctx = gridCtx;
  const w = gridCanvas.width;
  const h = gridCanvas.height;

  ctx.clearRect(0, 0, w, h);

  if (!gridEnabled) return;

  const spacing = CONFIG.GRID_SPACING * view.scale;
  if (spacing < 8) return; // too dense

  // Compute visible range in world coords
  const topLeft = screenToWorld(0, 0);
  const botRight = screenToWorld(w, h);

  const startX = Math.floor(topLeft.x / CONFIG.GRID_SPACING) * CONFIG.GRID_SPACING;
  const endX = Math.ceil(botRight.x / CONFIG.GRID_SPACING) * CONFIG.GRID_SPACING;
  const startY = Math.floor(topLeft.y / CONFIG.GRID_SPACING) * CONFIG.GRID_SPACING;
  const endY = Math.ceil(botRight.y / CONFIG.GRID_SPACING) * CONFIG.GRID_SPACING;

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;

  // Draw distorted grid lines
  // Horizontal
  for (let wy = startY; wy <= endY; wy += CONFIG.GRID_SPACING) {
    ctx.beginPath();
    let first = true;
    for (let wx = startX; wx <= endX; wx += CONFIG.GRID_SPACING) {
      const distorted = applyGridDistortion(wx, wy);
      const screen = worldToScreen(distorted.x, distorted.y);
      if (first) { ctx.moveTo(screen.x, screen.y); first = false; }
      else ctx.lineTo(screen.x, screen.y);
    }
    ctx.stroke();
  }

  // Vertical
  for (let wx = startX; wx <= endX; wx += CONFIG.GRID_SPACING) {
    ctx.beginPath();
    let first = true;
    for (let wy = startY; wy <= endY; wy += CONFIG.GRID_SPACING) {
      const distorted = applyGridDistortion(wx, wy);
      const screen = worldToScreen(distorted.x, distorted.y);
      if (first) { ctx.moveTo(screen.x, screen.y); first = false; }
      else ctx.lineTo(screen.x, screen.y);
    }
    ctx.stroke();
  }

  // Draw gravity well glows
  for (const node of state.nodes) {
    const screen = worldToScreen(node.x, node.y);
    const radius = (node.mass / CONFIG.MAX_EXPECTED_MASS) * 120 * view.scale;
    if (radius < 5) continue;

    const isFocal = node.id === state.focalNodeId;
    const color = isFocal ? 'rgba(255,215,0,' : 'rgba(200,162,255,';

    const grad = ctx.createRadialGradient(screen.x, screen.y, 0, screen.x, screen.y, radius);
    grad.addColorStop(0, color + '0.08)');
    grad.addColorStop(0.5, color + '0.03)');
    grad.addColorStop(1, color + '0)');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(screen.x, screen.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function applyGridDistortion(wx, wy) {
  let dx = 0, dy = 0;
  for (const node of state.nodes) {
    const ddx = wx - node.x;
    const ddy = wy - node.y;
    const dist = Math.sqrt(ddx * ddx + ddy * ddy);
    if (dist > CONFIG.GRID_DISTORTION_RADIUS || dist < 1) continue;
    const strength = (1 - dist / CONFIG.GRID_DISTORTION_RADIUS);
    const pull = strength * strength * CONFIG.GRID_DISTORTION_STRENGTH * (node.mass / CONFIG.MAX_EXPECTED_MASS);
    dx -= (ddx / dist) * pull;
    dy -= (ddy / dist) * pull;
  }
  return { x: wx + dx, y: wy + dy };
}

// ═══════════════════════════════════════════════════════
//  RENDERING — CONNECTIONS
// ═══════════════════════════════════════════════════════

function drawConnections() {
  const svg = connectionSvg;

  // Preserve the <defs> element, clear everything else
  const defs = svg.querySelector('defs');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (defs) svg.appendChild(defs);

  const nodes = state.nodes;

  // --- Proximity-based dashed connections ---
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > CONFIG.CONNECTION_DISTANCE) continue;

      // Skip if there's already a manual edge between these nodes
      const hasEdge = state.edges.some(e =>
        (e.from === a.id && e.to === b.id) || (e.from === b.id && e.to === a.id));
      if (hasEdge) continue;

      const opacity = Math.max(0, 1 - dist / CONFIG.CONNECTION_DISTANCE) * 0.3;
      const sa = worldToScreen(a.x, a.y);
      const sb = worldToScreen(b.x, b.y);
      const nodeW = 110 * view.scale;
      const nodeH = 40 * view.scale;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', sa.x + nodeW);
      line.setAttribute('y1', sa.y + nodeH);
      line.setAttribute('x2', sb.x + nodeW);
      line.setAttribute('y2', sb.y + nodeH);
      line.setAttribute('stroke', `rgba(200,162,255,${opacity})`);
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '4,4');
      svg.appendChild(line);
    }
  }

  // --- Manual directed edges (arrows) ---
  // Build screen-space hit geometry for click/hover detection
  edgeHitSegments = [];

  for (const edge of state.edges) {
    const fromNode = getNode(edge.from);
    const toNode = getNode(edge.to);
    if (!fromNode || !toNode) continue;

    const from = getConnectorScreenPos(fromNode, edge.fromSide);
    const to = getConnectorScreenPos(toNode, edge.toSide);

    // Shorten line slightly so arrowhead sits at the handle edge
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) continue;
    const ux = dx / len;
    const uy = dy / len;
    const arrowTip = { x: to.x - ux * 4, y: to.y - uy * 4 };

    // Store segment for hit testing
    edgeHitSegments.push({ id: edge.id, x1: from.x, y1: from.y, x2: arrowTip.x, y2: arrowTip.y });

    // Edge value = source mass * edge weight → drives stroke width
    const edgeValue = fromNode.mass * (edge.weight ?? 10);
    // Map to stroke width: log scale, clamped between 0.75 and 7.5
    const strokeW = Math.max(0.34, Math.min(3.5, (1 + Math.log1p(edgeValue) * 0.8) * 0.345));

    // Visible arrow line
    const isHovered = edge.id === hoveredEdgeId;
    const isSelected = edge.id === activeEdgeMenuId;
    const highlight = isSelected || isHovered;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', arrowTip.x);
    line.setAttribute('y2', arrowTip.y);
    line.setAttribute('stroke', highlight ? '#fff' : 'var(--accent)');
    line.setAttribute('stroke-width', highlight ? strokeW + 1 : strokeW);
    line.setAttribute('marker-end', 'url(#arrowhead)');

    // Animate new edges
    const age = Date.now() - (edge.createdAt || 0);
    if (age < 500) {
      line.classList.add('edge-line', 'animating');
      line.style.strokeDasharray = len;
      line.style.setProperty('--arrow-length', len);
    }

    svg.appendChild(line);

    // Edge label + weight badge at midpoint
    const edgeWeight = edge.weight ?? 1;
    const hasLabel = edge.label && edge.label.length > 0;
    const showWeight = edgeWeight !== 1;

    if (hasLabel || showWeight) {
      const midX = (from.x + arrowTip.x) / 2;
      const midY = (from.y + arrowTip.y) / 2;

      const displayText = [
        hasLabel ? edge.label : '',
        showWeight ? `w:${edgeWeight}` : '',
      ].filter(Boolean).join(' \u00b7 ');

      const textLen = displayText.length * 6.2;

      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', midX - textLen / 2 - 5);
      bg.setAttribute('y', midY - 18);
      bg.setAttribute('width', textLen + 10);
      bg.setAttribute('height', 16);
      bg.setAttribute('rx', '3');
      bg.setAttribute('fill', 'var(--bg)');
      bg.setAttribute('stroke', 'var(--border)');
      bg.setAttribute('stroke-width', '0.5');
      svg.appendChild(bg);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', midX);
      text.setAttribute('y', midY - 6);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', 'var(--accent)');
      text.setAttribute('font-family', 'var(--font-mono)');
      text.setAttribute('font-size', '10');
      text.textContent = displayText;
      svg.appendChild(text);
    }
  }

  // --- Temp line while dragging a connection ---
  if (connectDrag && connectDrag.tempLine) {
    const tl = connectDrag.tempLine;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', tl.x1);
    line.setAttribute('y1', tl.y1);
    line.setAttribute('x2', tl.x2);
    line.setAttribute('y2', tl.y2);
    line.setAttribute('stroke', 'var(--accent)');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '6,4');
    line.setAttribute('opacity', '0.6');
    line.setAttribute('marker-end', 'url(#arrowhead-ghost)');
    svg.appendChild(line);
  }
}

// ═══════════════════════════════════════════════════════
//  CONNECTOR POSITIONS
// ═══════════════════════════════════════════════════════

function getConnectorScreenPos(node, side) {
  const el = document.getElementById(node.id);
  const w = 220;
  const h = el ? el.offsetHeight : 80;

  let wx, wy;
  switch (side) {
    case 'top':    wx = node.x + w / 2; wy = node.y; break;
    case 'right':  wx = node.x + w;     wy = node.y + h / 2; break;
    case 'bottom': wx = node.x + w / 2; wy = node.y + h; break;
    case 'left':   wx = node.x;         wy = node.y + h / 2; break;
  }
  return worldToScreen(wx, wy);
}

// ═══════════════════════════════════════════════════════
//  CONNECTION DRAG (VISIO-STYLE)
// ═══════════════════════════════════════════════════════

function startConnectDrag(nodeId, side, e) {
  const node = getNode(nodeId);
  if (!node) return;

  const from = getConnectorScreenPos(node, side);

  connectDrag = {
    fromNodeId: nodeId,
    fromSide: side,
    tempLine: { x1: from.x, y1: from.y, x2: e.clientX, y2: e.clientY },
  };

  // Mark the source handle
  const handle = document.querySelector(
    `.connector-handle[data-node-id="${nodeId}"][data-side="${side}"]`);
  if (handle) handle.classList.add('dragging-source');

  // Add global class so all other handles become visible drop targets
  document.body.classList.add('connecting-active');
}

function updateConnectDrag(e) {
  if (!connectDrag) return;

  // Update the temp line endpoint
  const fromNode = getNode(connectDrag.fromNodeId);
  if (fromNode) {
    const from = getConnectorScreenPos(fromNode, connectDrag.fromSide);
    connectDrag.tempLine.x1 = from.x;
    connectDrag.tempLine.y1 = from.y;
  }
  connectDrag.tempLine.x2 = e.clientX;
  connectDrag.tempLine.y2 = e.clientY;

  // Hit-test: find nearest connector handle on a DIFFERENT node
  clearDropTargets();
  const SNAP_DIST = 30;
  let closest = null;
  let closestDist = SNAP_DIST;

  document.querySelectorAll('.connector-handle').forEach(handle => {
    if (handle.dataset.nodeId === connectDrag.fromNodeId) return;
    const rect = handle.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
    if (dist < closestDist) {
      closestDist = dist;
      closest = handle;
    }
  });

  if (closest) {
    closest.classList.add('drop-target-active');
    // Snap temp line to the target handle center
    const targetNode = getNode(closest.dataset.nodeId);
    if (targetNode) {
      const pos = getConnectorScreenPos(targetNode, closest.dataset.side);
      connectDrag.tempLine.x2 = pos.x;
      connectDrag.tempLine.y2 = pos.y;
    }
  }
}

function endConnectDrag(e) {
  if (!connectDrag) return;

  // Check if we dropped on a valid target
  const activeTarget = document.querySelector('.connector-handle.drop-target-active');
  let newEdge = null;

  if (activeTarget && activeTarget.dataset.nodeId !== connectDrag.fromNodeId) {
    newEdge = createEdge(
      connectDrag.fromNodeId,
      connectDrag.fromSide,
      activeTarget.dataset.nodeId,
      activeTarget.dataset.side,
    );
  }

  // Cleanup
  clearDropTargets();
  document.querySelectorAll('.connector-handle.dragging-source')
    .forEach(h => h.classList.remove('dragging-source'));
  document.body.classList.remove('connecting-active');
  connectDrag = null;

  // Show popup menu for the new edge so user can set weight/label
  if (newEdge) {
    onEdgeClick(newEdge.id, e);
  }
}

function clearDropTargets() {
  document.querySelectorAll('.connector-handle.drop-target-active')
    .forEach(h => h.classList.remove('drop-target-active'));
}

function createEdge(fromId, fromSide, toId, toSide) {
  // Avoid duplicates (same direction)
  const exists = state.edges.some(e =>
    e.from === fromId && e.fromSide === fromSide &&
    e.to === toId && e.toSide === toSide);
  if (exists) return null;

  const edge = {
    id: 'e_' + Date.now() + '_' + (edgeIdCounter++),
    from: fromId,
    fromSide,
    to: toId,
    toSide,
    label: '',
    weight: 10,
    createdAt: Date.now(),
  };
  state.edges.push(edge);
  recomputeMasses();
  scheduleSave();
  return edge;
}

function deleteEdge(edgeId) {
  state.edges = state.edges.filter(e => e.id !== edgeId);
  recomputeMasses();
  scheduleSave();
}

// ═══════════════════════════════════════════════════════
//  EDGE HIT TESTING (geometric, no SVG pointer events)
// ═══════════════════════════════════════════════════════

let edgeHitSegments = []; // rebuilt each frame by drawConnections
let hoveredEdgeId = null;
const EDGE_HIT_DIST = 10; // pixels

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function edgeAtPoint(sx, sy) {
  let best = null, bestDist = EDGE_HIT_DIST;
  for (const seg of edgeHitSegments) {
    const d = pointToSegmentDist(sx, sy, seg.x1, seg.y1, seg.x2, seg.y2);
    if (d < bestDist) { bestDist = d; best = seg.id; }
  }
  return best;
}

// ═══════════════════════════════════════════════════════
//  EDGE CONTEXT MENU
// ═══════════════════════════════════════════════════════

let activeEdgeMenuId = null;

function onEdgeClick(edgeId, ev) {
  const edge = state.edges.find(e => e.id === edgeId);
  if (!edge) return;

  const menu = document.getElementById('edge-menu');
  activeEdgeMenuId = edgeId;

  // Populate fields with current values
  const labelInput = document.getElementById('edge-menu-label');
  const weightInput = document.getElementById('edge-menu-weight');
  labelInput.value = edge.label || '';
  weightInput.value = edge.weight ?? 1;

  // Position near the click, nudged to stay in viewport
  let mx = ev.clientX;
  let my = ev.clientY;
  menu.classList.add('open');
  const rect = menu.getBoundingClientRect();
  if (mx + rect.width > window.innerWidth) mx = window.innerWidth - rect.width - 8;
  if (my + rect.height > window.innerHeight) my = window.innerHeight - rect.height - 8;
  menu.style.left = mx + 'px';
  menu.style.top = my + 'px';

  // Focus the label field for quick editing
  requestAnimationFrame(() => labelInput.focus());
}

function closeEdgeMenu() {
  // Commit any pending changes before closing
  commitEdgeMenuFields();
  const menu = document.getElementById('edge-menu');
  menu.classList.remove('open');
  activeEdgeMenuId = null;
}

function commitEdgeMenuFields() {
  if (!activeEdgeMenuId) return;
  const edge = state.edges.find(e => e.id === activeEdgeMenuId);
  if (!edge) return;

  const labelInput = document.getElementById('edge-menu-label');
  const weightInput = document.getElementById('edge-menu-weight');

  const newLabel = labelInput.value.trim();
  const newWeight = parseInt(weightInput.value, 10);

  // Weight is mandatory — fall back to current value if invalid
  const validWeight = (!isNaN(newWeight) && newWeight >= 1) ? newWeight : edge.weight;

  let changed = false;
  if (edge.label !== newLabel) { edge.label = newLabel; changed = true; }
  if (edge.weight !== validWeight) { edge.weight = validWeight; changed = true; }
  if (changed) {
    recomputeMasses();
    scheduleSave();
  }
}

function handleEdgeMenuAction(action) {
  const edgeId = activeEdgeMenuId;
  if (!edgeId) return;

  if (action === 'delete') {
    // Close without committing since we're deleting
    const menu = document.getElementById('edge-menu');
    menu.classList.remove('open');
    activeEdgeMenuId = null;
    deleteEdge(edgeId);
    showToast('Edge removed');
  }
}

// ═══════════════════════════════════════════════════════
//  RENDERING — NODES
// ═══════════════════════════════════════════════════════

function renderNodeDOM(node) {
  const el = document.createElement('div');
  el.className = 'node';
  el.id = node.id;

  el.innerHTML = `
    <div class="mass-indicator"></div>
    <div class="connector-handle top" data-node-id="${node.id}" data-side="top"></div>
    <div class="connector-handle right" data-node-id="${node.id}" data-side="right"></div>
    <div class="connector-handle bottom" data-node-id="${node.id}" data-side="bottom"></div>
    <div class="connector-handle left" data-node-id="${node.id}" data-side="left"></div>
    <div class="node-actions">
      <button class="node-action-btn" onclick="setFocalNode('${node.id}')" title="Set as focal point">&#9678;</button>
      <button class="node-action-btn delete" onclick="deleteNode('${node.id}')" title="Delete node">&times;</button>
    </div>
    <div class="title" contenteditable="true" spellcheck="false">${escapeHTML(node.title)}</div>
    <div class="body" contenteditable="true" spellcheck="false">${escapeHTML(node.body)}</div>
    <div class="context-weight-bar"><div class="fill" style="width:0%"></div></div>
    <div class="meta">
      <span class="mass-label">mass: ${node.mass.toFixed(1)}</span>
    </div>
  `;

  // Text editing events
  const titleEl = el.querySelector('.title');
  const bodyEl = el.querySelector('.body');

  titleEl.addEventListener('focus', () => { editingNode = node.id; node.pinned = true; });
  titleEl.addEventListener('blur', () => {
    editingNode = null;
    node.title = titleEl.textContent;
    node.updatedAt = Date.now();
    if (!draggingNode || draggingNode.id !== node.id) node.pinned = false;
    recomputeMasses();
    updateContextWeights();
    scheduleSave();
  });

  bodyEl.addEventListener('focus', () => { editingNode = node.id; node.pinned = true; });
  bodyEl.addEventListener('blur', () => {
    editingNode = null;
    node.body = bodyEl.textContent;
    node.updatedAt = Date.now();
    if (!draggingNode || draggingNode.id !== node.id) node.pinned = false;
    recomputeMasses();
    updateContextWeights();
    scheduleSave();
  });

  // Prevent drag when editing text
  titleEl.addEventListener('mousedown', (e) => e.stopPropagation());
  bodyEl.addEventListener('mousedown', (e) => e.stopPropagation());

  // Connector handle drag-to-connect
  el.querySelectorAll('.connector-handle').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.stopPropagation();
      e.preventDefault();
      startConnectDrag(node.id, handle.dataset.side, e);
    });
  });

  // Node drag
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('.node-action-btn')) return;
    if (e.target.closest('.connector-handle')) return;
    if (e.target.closest('[contenteditable]')) return;
    e.stopPropagation();
    startNodeDrag(node, e);
  });

  // Right-click for focal
  el.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    setFocalNode(node.id);
  });

  nodeLayer.appendChild(el);
}

function syncNodePositions() {
  const lod = view.scale < 0.2 ? 'dot' : view.scale < 0.4 ? 'title-only' : 'full';

  for (const node of state.nodes) {
    const el = document.getElementById(node.id);
    if (!el) continue;

    el.style.transform = `translate(${node.x}px, ${node.y}px)`;

    // Focal class
    el.classList.toggle('focal', node.id === state.focalNodeId);

    // Level of detail
    const bodyEl = el.querySelector('.body');
    const metaEl = el.querySelector('.meta');
    const weightBar = el.querySelector('.context-weight-bar');

    if (lod === 'dot') {
      el.style.width = '16px';
      el.style.height = '16px';
      el.style.padding = '0';
      el.style.borderRadius = '50%';
      el.style.overflow = 'hidden';
      el.style.background = node.id === state.focalNodeId ? 'var(--focal-color)' : 'var(--accent)';
      if (bodyEl) bodyEl.style.display = 'none';
      if (metaEl) metaEl.style.display = 'none';
      if (weightBar) weightBar.style.display = 'none';
      el.querySelector('.title').style.display = 'none';
      el.querySelector('.node-actions').style.display = 'none';
    } else if (lod === 'title-only') {
      el.style.width = '';
      el.style.height = '';
      el.style.padding = '6px 10px';
      el.style.borderRadius = '';
      el.style.overflow = '';
      el.style.background = '';
      el.querySelector('.title').style.display = '';
      el.querySelector('.node-actions').style.display = '';
      if (bodyEl) bodyEl.style.display = 'none';
      if (metaEl) metaEl.style.display = 'none';
      if (weightBar) weightBar.style.display = 'none';
    } else {
      el.style.width = '';
      el.style.height = '';
      el.style.padding = '';
      el.style.borderRadius = '';
      el.style.overflow = '';
      el.style.background = '';
      el.querySelector('.title').style.display = '';
      el.querySelector('.node-actions').style.display = '';
      if (bodyEl) bodyEl.style.display = '';
      if (metaEl) metaEl.style.display = '';
      if (weightBar) weightBar.style.display = '';
    }

    // Update meta
    const massLabel = el.querySelector('.mass-label');
    if (massLabel) massLabel.textContent = `mass: ${node.mass.toFixed(1)}`;
  }
}

// ═══════════════════════════════════════════════════════
//  RENDERING — MINIMAP
// ═══════════════════════════════════════════════════════

function drawMinimap() {
  const ctx = minimapCtx;
  const w = 160, h = 100;
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = 'rgba(10,10,15,0.8)';
  ctx.fillRect(0, 0, w, h);

  if (state.nodes.length === 0) return;

  // Find bounds
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of state.nodes) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y);
  }

  const padding = 200;
  minX -= padding; maxX += padding;
  minY -= padding; maxY += padding;

  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const scaleX = w / rangeX;
  const scaleY = h / rangeY;
  const s = Math.min(scaleX, scaleY);

  const offX = (w - rangeX * s) / 2;
  const offY = (h - rangeY * s) / 2;

  // Draw nodes as dots
  for (const n of state.nodes) {
    const mx = (n.x - minX) * s + offX;
    const my = (n.y - minY) * s + offY;
    const r = Math.max(2, n.mass * 0.3);

    ctx.fillStyle = n.id === state.focalNodeId ? '#ffd700' : '#c8a2ff';
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw viewport rectangle
  const vpTopLeft = screenToWorld(0, 0);
  const vpBotRight = screenToWorld(window.innerWidth, window.innerHeight);

  const rx = (vpTopLeft.x - minX) * s + offX;
  const ry = (vpTopLeft.y - minY) * s + offY;
  const rw = (vpBotRight.x - vpTopLeft.x) * s;
  const rh = (vpBotRight.y - vpTopLeft.y) * s;

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(rx, ry, rw, rh);
}

// ═══════════════════════════════════════════════════════
//  CONTEXT WEIGHTS
// ═══════════════════════════════════════════════════════

function contextWeight(node, focalNode) {
  if (node.id === focalNode.id) return 1.0;
  const dist = Math.hypot(node.x - focalNode.x, node.y - focalNode.y);
  const proximity = Math.max(0, 1 - dist / (CONFIG.GRAVITY_RADIUS * 3));
  const mass = node.mass;
  return Math.pow(proximity, 2) * (mass / CONFIG.MAX_EXPECTED_MASS);
}

function updateContextWeights() {
  const focalNode = getNode(state.focalNodeId);

  // Update node DOM weight bars
  for (const node of state.nodes) {
    const el = document.getElementById(node.id);
    if (!el) continue;

    let weight = 0;
    if (focalNode) {
      weight = contextWeight(node, focalNode);
    }

    const fill = el.querySelector('.context-weight-bar .fill');
    if (fill) fill.style.width = (weight * 100) + '%';

  }

  // Update context sidebar
  updateContextSidebar();
}

function updateContextSidebar() {
  const focalNode = getNode(state.focalNodeId);
  if (!focalNode) {
    contextList.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:11px;">No focal node selected.<br>Right-click a node to set it.</div>';
    return;
  }

  const weighted = state.nodes
    .map(n => ({ node: n, weight: contextWeight(n, focalNode) }))
    .filter(({ weight }) => weight > 0.005)
    .sort((a, b) => b.weight - a.weight);

  contextList.innerHTML = weighted.map(({ node, weight }) => `
    <div class="context-item ${node.id === focalNode.id ? 'focal' : ''}" onclick="panToNode('${node.id}')">
      <div class="weight-bar"><div class="fill" style="width:${weight * 100}%"></div></div>
      <div class="ctx-title">${escapeHTML(node.title || 'Untitled')}</div>
      <div class="ctx-weight">${Math.round(weight * 100)}%</div>
    </div>
  `).join('');
}

function updateFocalDisplay() {
  const focalNode = getNode(state.focalNodeId);
  const nameEl = document.getElementById('conv-focal-name');
  if (nameEl) {
    nameEl.textContent = focalNode ? (focalNode.title || 'Untitled') : 'No focal node';
  }
}

// ═══════════════════════════════════════════════════════
//  AI INTEGRATION — CONTEXT ASSEMBLY
// ═══════════════════════════════════════════════════════

function assembleContext(focalNodeId) {
  const focalNode = getNode(focalNodeId);
  if (!focalNode) return '';

  const weighted = state.nodes
    .map(n => ({ node: n, weight: contextWeight(n, focalNode) }))
    .filter(({ weight }) => weight > 0.01)
    .sort((a, b) => b.weight - a.weight);

  let usedTokens = 0;
  const included = [];

  for (const { node, weight } of weighted) {
    const text = node.title + '\n' + node.body;
    const tokens = Math.ceil(text.length / CONFIG.CHARS_PER_TOKEN);
    if (usedTokens + tokens > CONFIG.TOKEN_BUDGET) continue;
    included.push({ node, weight });
    usedTokens += tokens;
  }

  return included.map(({ node, weight }) => {
    const pct = Math.round(weight * 100);
    const label = node.id === focalNodeId ? 'FOCAL POINT' : '';
    return `━━━ [${pct}%] ${node.title || 'Untitled'} ${label}\n"${node.body}"`;
  }).join('\n\n');
}

const SYSTEM_PROMPT = `You are a thinking partner. The user is working on a spatial thought canvas where ideas are arranged by importance and proximity. Below is the context assembled from their canvas, weighted by spatial relevance to their current focal point. Weight percentages indicate how central each node is — lean heavily on high-weight nodes and lightly reference low-weight ones. Be concise and insightful.`;

async function queryAI(userMessage) {
  const focalNode = getNode(state.focalNodeId);
  if (!focalNode) {
    return 'Please set a focal node first (right-click a node).';
  }

  const contextBlock = assembleContext(state.focalNodeId);

  // Check for API key
  const apiKey = localStorage.getItem('gcf_api_key');
  if (!apiKey) {
    return 'No API key set. Open browser console and run:\nlocalStorage.setItem("gcf_api_key", "your-key-here")';
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT + '\n\nCONTEXT (sorted by relevance):\n' + contextBlock,
        messages: [
          ...state.conversationHistory.slice(-10).map(m => ({
            role: m.role,
            content: m.content,
          })),
          { role: 'user', content: userMessage },
        ],
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      return `API Error ${response.status}: ${err.error?.message || response.statusText}`;
    }

    const data = await response.json();
    return data.content.map(b => b.text || '').join('');
  } catch (err) {
    return `Network error: ${err.message}`;
  }
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  chatInput.value = '';

  // Add user message
  addMessageToUI('user', text);
  state.conversationHistory.push({
    role: 'user',
    content: text,
    focalNodeId: state.focalNodeId,
    timestamp: new Date().toISOString(),
  });

  // Show typing
  const typingEl = addMessageToUI('assistant', 'Thinking...', true);

  const reply = await queryAI(text);

  // Remove typing indicator
  typingEl.remove();

  // Add response
  addMessageToUI('assistant', reply);
  state.conversationHistory.push({
    role: 'assistant',
    content: reply,
    focalNodeId: state.focalNodeId,
    timestamp: new Date().toISOString(),
  });

  scheduleSave();
}

function addMessageToUI(role, content, isTyping = false) {
  const el = document.createElement('div');
  el.className = `message ${role}${isTyping ? ' typing' : ''}`;
  el.textContent = content;
  messagesDiv.appendChild(el);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return el;
}

// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════

function saveState() {
  const data = {
    version: 2,
    canvasId: state.canvasId,
    name: state.canvasName,
    createdAt: state.createdAt,
    updatedAt: new Date().toISOString(),
    focalNodeId: state.focalNodeId,
    viewTransform: { ...view },
    nodes: state.nodes.map(n => ({
      id: n.id, x: n.x, y: n.y,
      title: n.title, body: n.body,
      baseMass: n.baseMass,
      references: n.references,
      pinned: false,
      createdAt: n.createdAt,
      updatedAt: n.updatedAt,
    })),
    edges: state.edges.map(e => ({
      id: e.id, from: e.from, fromSide: e.fromSide,
      to: e.to, toSide: e.toSide,
      label: e.label || '', weight: e.weight ?? 1,
      createdAt: e.createdAt,
    })),
    conversationHistory: state.conversationHistory,
  };

  localStorage.setItem(`gcf_canvas_${state.canvasId}`, JSON.stringify(data));
  flashSaveIndicator();
}

function loadState(canvasId) {
  const raw = localStorage.getItem(`gcf_canvas_${canvasId || 'default'}`);
  if (!raw) return false;

  try {
    const data = JSON.parse(raw);
    state.canvasId = data.canvasId || 'default';
    state.canvasName = data.name || 'Untitled Canvas';
    state.focalNodeId = data.focalNodeId;
    state.conversationHistory = data.conversationHistory || [];
    state.edges = (data.edges || []).map(e => ({ ...e }));
    state.createdAt = data.createdAt;

    // Restore view
    if (data.viewTransform) {
      view.x = data.viewTransform.x;
      view.y = data.viewTransform.y;
      view.scale = data.viewTransform.scale;
    }

    // Restore nodes
    nodeLayer.innerHTML = '';
    state.nodes = [];
    for (const nd of data.nodes) {
      const node = {
        ...nd,
        prevX: nd.x,
        prevY: nd.y,
        pinned: false,
        baseMass: nd.baseMass ?? Math.floor(Math.random() * 100) + 1,
        mass: 0,
      };
      state.nodes.push(node);
      renderNodeDOM(node);
    }
    recomputeMasses();
    updateFocalDisplay();
    updateContextWeights();

    // Restore conversation UI
    messagesDiv.innerHTML = '';
    for (const msg of state.conversationHistory) {
      addMessageToUI(msg.role, msg.content);
    }

    return true;
  } catch (e) {
    console.error('Failed to load canvas:', e);
    return false;
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, CONFIG.AUTO_SAVE_DELAY);
}

function flashSaveIndicator() {
  const dot = document.querySelector('#save-indicator .dot');
  dot.classList.remove('pulse');
  void dot.offsetWidth; // reflow
  dot.classList.add('pulse');
}

function exportCanvas() {
  const data = localStorage.getItem(`gcf_canvas_${state.canvasId}`);
  if (!data) return;
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.canvasName.replace(/\s+/g, '-').toLowerCase()}.gcf.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Canvas exported');
}

function importCanvas(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.version || !data.nodes) throw new Error('Invalid format');
      localStorage.setItem(`gcf_canvas_${data.canvasId || 'imported'}`, reader.result);
      loadState(data.canvasId || 'imported');
      showToast('Canvas imported');
    } catch (e) {
      showToast('Import failed: ' + e.message);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════
//  INTERACTION — DRAG, PAN, ZOOM
// ═══════════════════════════════════════════════════════

function startNodeDrag(node, e) {
  draggingNode = node;
  node.pinned = true;
  dragHistory = [];
  hoveredEdgeId = null;
  container.style.cursor = '';

  const worldPos = screenToWorld(e.clientX, e.clientY);
  dragOffset.x = node.x - worldPos.x;
  dragOffset.y = node.y - worldPos.y;

  const el = document.getElementById(node.id);
  if (el) el.classList.add('dragging');
  container.classList.add('grabbing');
}

function onMouseMove(e) {
  // Connection drag takes priority
  if (connectDrag) {
    updateConnectDrag(e);
    return;
  }

  if (draggingNode) {
    const worldPos = screenToWorld(e.clientX, e.clientY);
    draggingNode.x = worldPos.x + dragOffset.x;
    draggingNode.y = worldPos.y + dragOffset.y;

    // Record drag history for inertia
    dragHistory.push({ x: draggingNode.x, y: draggingNode.y, t: performance.now() });
    if (dragHistory.length > CONFIG.DRAG_HISTORY_SIZE) dragHistory.shift();

    updateContextWeights();
    return;
  }

  if (isPanning) {
    view.x = viewStart.x + (e.clientX - panStart.x);
    view.y = viewStart.y + (e.clientY - panStart.y);
    applyViewTransform();
    return;
  }

  // Edge hover detection (only when idle)
  const hitEdge = edgeAtPoint(e.clientX, e.clientY);
  if (hitEdge !== hoveredEdgeId) {
    hoveredEdgeId = hitEdge;
    container.style.cursor = hitEdge ? 'pointer' : '';
  }
}

function onMouseUp(e) {
  // End connection drag if active
  if (connectDrag) {
    endConnectDrag(e);
    return;
  }

  if (draggingNode) {
    const el = document.getElementById(draggingNode.id);
    if (el) el.classList.remove('dragging');
    container.classList.remove('grabbing');

    // Apply inertia from drag history
    if (dragHistory.length >= 2) {
      const last = dragHistory[dragHistory.length - 1];
      const prev = dragHistory[0];
      const dt = (last.t - prev.t) / 1000;
      if (dt > 0 && dt < 0.2) {
        const vx = (last.x - prev.x) / dt * 0.016;
        const vy = (last.y - prev.y) / dt * 0.016;
        draggingNode.prevX = draggingNode.x - vx * 0.3;
        draggingNode.prevY = draggingNode.y - vy * 0.3;
      }
    }

    draggingNode.pinned = false;
    draggingNode = null;
    dragHistory = [];
    scheduleSave();
    return;
  }

  if (isPanning) {
    isPanning = false;
    container.classList.remove('grabbing');
    scheduleSave();
  }
}

function onMouseDown(e) {
  // Only handle clicks on canvas background
  if (e.target !== container && e.target !== gridCanvas) return;

  // Check if clicking on an edge first (left-click only)
  if (e.button === 0) {
    const hitEdge = edgeAtPoint(e.clientX, e.clientY);
    if (hitEdge) {
      e.preventDefault();
      e.stopPropagation();
      onEdgeClick(hitEdge, e);
      return;
    }
  }

  if (e.button === 1 || (e.button === 0 && !e.target.closest('.node'))) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    viewStart = { x: view.x, y: view.y };
    container.classList.add('grabbing');
    e.preventDefault();
  }
}

function onWheel(e) {
  e.preventDefault();

  // Focal zoom toward cursor
  const worldBefore = screenToWorld(e.clientX, e.clientY);
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  view.scale = Math.max(view.minScale, Math.min(view.maxScale, view.scale * zoomFactor));
  const worldAfter = screenToWorld(e.clientX, e.clientY);
  view.x += (worldAfter.x - worldBefore.x) * view.scale;
  view.y += (worldAfter.y - worldBefore.y) * view.scale;

  applyViewTransform();
}

function onDblClick(e) {
  if (e.target.closest('.node')) return;
  const world = screenToWorld(e.clientX, e.clientY);
  const node = createNode(world.x, world.y);

  // Focus the title for immediate editing
  requestAnimationFrame(() => {
    const el = document.getElementById(node.id);
    if (el) {
      const titleEl = el.querySelector('.title');
      titleEl.focus();
    }
  });
}

function onKeyDown(e) {
  if (editingNode) return; // don't intercept when editing text

  if (e.key === 'Delete' || e.key === 'Backspace') {
    // Delete focused/selected node
    const active = document.activeElement;
    if (active && active.closest('.node')) {
      const nodeEl = active.closest('.node');
      deleteNode(nodeEl.id);
    }
  }

  if (e.ctrlKey || e.metaKey) {
    if (e.key === '0') {
      e.preventDefault();
      fitAllNodes();
    }
    if (e.key === 's') {
      e.preventDefault();
      saveState();
      showToast('Canvas saved');
    }
  }
}

function applyViewTransform() {
  nodeLayer.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION HELPERS
// ═══════════════════════════════════════════════════════

function fitAllNodes() {
  if (state.nodes.length === 0) {
    view.x = window.innerWidth / 2;
    view.y = window.innerHeight / 2;
    view.scale = 1;
    applyViewTransform();
    return;
  }

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of state.nodes) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x + 220);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y + 100);
  }

  const padding = 100;
  const rangeX = (maxX - minX) + padding * 2;
  const rangeY = (maxY - minY) + padding * 2;
  const scaleX = window.innerWidth / rangeX;
  const scaleY = window.innerHeight / rangeY;
  view.scale = Math.min(scaleX, scaleY, 2.0);
  view.scale = Math.max(view.scale, view.minScale);

  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  view.x = window.innerWidth / 2 - cx * view.scale;
  view.y = window.innerHeight / 2 - cy * view.scale;

  applyViewTransform();
}

function panToNode(id) {
  const node = getNode(id);
  if (!node) return;

  view.x = window.innerWidth / 2 - (node.x + 110) * view.scale;
  view.y = window.innerHeight / 2 - (node.y + 50) * view.scale;
  applyViewTransform();
}

function addNodeAtCenter() {
  const world = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
  const node = createNode(world.x - 110, world.y - 50);
  requestAnimationFrame(() => {
    const el = document.getElementById(node.id);
    if (el) el.querySelector('.title').focus();
  });
}

// ═══════════════════════════════════════════════════════
//  UI TOGGLES
// ═══════════════════════════════════════════════════════

function togglePhysics() {
  physicsEnabled = !physicsEnabled;
  document.getElementById('btn-physics').classList.toggle('active', physicsEnabled);
}

function toggleGrid() {

  document.getElementById('btn-grid').classList.toggle('active', gridEnabled);
}

  document.getElementById('context-panel').classList.toggle('open', contextPanelOpen);
  document.getElementById('btn-context').classList.toggle('active', contextPanelOpen);

function toggleConversationPanel() {

  document.getElementById('conversation-panel').classList.toggle('open', conversationPanelOpen);
  document.getElementById('btn-chat').classList.toggle('active', conversationPanelOpen);
  if (conversationPanelOpen) {
    updateFocalDisplay();
    chatInput.focus();
  }
}

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  let toast = document.querySelector('.toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
//  MINIMAP CLICK
// ═══════════════════════════════════════════════════════

function onMinimapClick(e) {
  if (state.nodes.length === 0) return;

  const rect = e.currentTarget.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Reconstruct the same mapping used in drawMinimap
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of state.nodes) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y);
  }
  const padding = 200;
  minX -= padding; maxX += padding;
  minY -= padding; maxY += padding;

  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const w = 160, h = 100;
  const scaleX = w / rangeX;
  const scaleY = h / rangeY;
  const s = Math.min(scaleX, scaleY);
  const offX = (w - rangeX * s) / 2;
  const offY = (h - rangeY * s) / 2;

  // Reverse map click position to world coords
  const worldX = (mx - offX) / s + minX;
  const worldY = (my - offY) / s + minY;

  // Center view on that world position
  view.x = window.innerWidth / 2 - worldX * view.scale;
  view.y = window.innerHeight / 2 - worldY * view.scale;
  applyViewTransform();
}

// ═══════════════════════════════════════════════════════
//  TOUCH EVENTS (MOBILE)
// ═══════════════════════════════════════════════════════

let touchState = { mode: null, startDist: 0, startScale: 1, startMid: null };

function onTouchStart(e) {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);

    // Check if touching a node
    const nodeEl = target?.closest('.node');
    if (nodeEl && !target.closest('[contenteditable]')) {
      const node = getNode(nodeEl.id);
      if (node) {
        e.preventDefault();
        touchState.mode = 'drag-node';
        draggingNode = node;
        node.pinned = true;
        dragHistory = [];
        const worldPos = screenToWorld(touch.clientX, touch.clientY);
        dragOffset.x = node.x - worldPos.x;
        dragOffset.y = node.y - worldPos.y;
        nodeEl.classList.add('dragging');
        return;
      }
    }

    // Pan
    e.preventDefault();
    touchState.mode = 'pan';
    panStart = { x: touch.clientX, y: touch.clientY };
    viewStart = { x: view.x, y: view.y };
  } else if (e.touches.length === 2) {
    e.preventDefault();
    touchState.mode = 'pinch';
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchState.startDist = Math.hypot(dx, dy);
    touchState.startScale = view.scale;
    touchState.startMid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    panStart = { x: touchState.startMid.x, y: touchState.startMid.y };
    viewStart = { x: view.x, y: view.y };
  }
}

function onTouchMove(e) {
  e.preventDefault();

  if (touchState.mode === 'drag-node' && draggingNode && e.touches.length === 1) {
    const touch = e.touches[0];
    const worldPos = screenToWorld(touch.clientX, touch.clientY);
    draggingNode.x = worldPos.x + dragOffset.x;
    draggingNode.y = worldPos.y + dragOffset.y;
    dragHistory.push({ x: draggingNode.x, y: draggingNode.y, t: performance.now() });
    if (dragHistory.length > CONFIG.DRAG_HISTORY_SIZE) dragHistory.shift();
    updateContextWeights();
    return;
  }

  if (touchState.mode === 'pan' && e.touches.length === 1) {
    const touch = e.touches[0];
    view.x = viewStart.x + (touch.clientX - panStart.x);
    view.y = viewStart.y + (touch.clientY - panStart.y);
    applyViewTransform();
    return;
  }

  if (touchState.mode === 'pinch' && e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const mid = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };

    // Zoom
    const worldBefore = screenToWorld(mid.x, mid.y);
    view.scale = Math.max(view.minScale, Math.min(view.maxScale,
      touchState.startScale * (dist / touchState.startDist)));
    const worldAfter = screenToWorld(mid.x, mid.y);
    view.x += (worldAfter.x - worldBefore.x) * view.scale;
    view.y += (worldAfter.y - worldBefore.y) * view.scale;

    // Pan
    view.x += mid.x - panStart.x;
    view.y += mid.y - panStart.y;
    panStart = { x: mid.x, y: mid.y };

    applyViewTransform();
  }
}

function onTouchEnd(e) {
  if (touchState.mode === 'drag-node' && draggingNode) {
    const el = document.getElementById(draggingNode.id);
    if (el) el.classList.remove('dragging');

    if (dragHistory.length >= 2) {
      const last = dragHistory[dragHistory.length - 1];
      const prev = dragHistory[0];
      const dt = (last.t - prev.t) / 1000;
      if (dt > 0 && dt < 0.2) {
        const vx = (last.x - prev.x) / dt * 0.016;
        const vy = (last.y - prev.y) / dt * 0.016;
        draggingNode.prevX = draggingNode.x - vx * 0.3;
        draggingNode.prevY = draggingNode.y - vy * 0.3;
      }
    }

    draggingNode.pinned = false;
    draggingNode = null;
    dragHistory = [];
    scheduleSave();
  }

  if (e.touches.length === 0) {
    touchState.mode = null;
    scheduleSave();
  } else if (e.touches.length === 1 && touchState.mode === 'pinch') {
    // Transitioned from pinch to single-finger: restart as pan
    touchState.mode = 'pan';
    panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    viewStart = { x: view.x, y: view.y };
  }
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════

let gridFrameCount = 0;

function mainLoop() {
  animFrameId = requestAnimationFrame(mainLoop);

  // Physics at 60fps
  physicsTick();

  // Sync node DOM positions every frame
  syncNodePositions();

  // Grid at ~30fps
  gridFrameCount++;
  if (gridFrameCount % 2 === 0) {
    drawGrid();
    drawConnections();
  }

  // Minimap at ~15fps
  if (gridFrameCount % 4 === 0) {
    drawMinimap();
  }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════

function init() {
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  // SVG arrowhead markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'arrowhead');
  marker.setAttribute('markerWidth', '4.25');
  marker.setAttribute('markerHeight', '2.9');
  marker.setAttribute('refX', '4');
  marker.setAttribute('refY', '1.45');
  marker.setAttribute('orient', 'auto');
  marker.setAttribute('markerUnits', 'strokeWidth');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  poly.setAttribute('points', '0 0, 4.25 1.45, 0 2.9');
  poly.setAttribute('fill', '#c8a2ff');
  marker.appendChild(poly);
  defs.appendChild(marker);

  const ghostMarker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  ghostMarker.setAttribute('id', 'arrowhead-ghost');
  ghostMarker.setAttribute('markerWidth', '4.25');
  ghostMarker.setAttribute('markerHeight', '2.9');
  ghostMarker.setAttribute('refX', '4');
  ghostMarker.setAttribute('refY', '1.45');
  ghostMarker.setAttribute('orient', 'auto');
  ghostMarker.setAttribute('markerUnits', 'strokeWidth');
  const ghostPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  ghostPoly.setAttribute('points', '0 0, 4.25 1.45, 0 2.9');
  ghostPoly.setAttribute('fill', 'rgba(200,162,255,0.4)');
  ghostMarker.appendChild(ghostPoly);
  defs.appendChild(ghostMarker);

  connectionSvg.appendChild(defs);

  // Event listeners
  container.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  container.addEventListener('wheel', onWheel, { passive: false });
  container.addEventListener('dblclick', onDblClick);
  window.addEventListener('keydown', onKeyDown);

  // Edge context menu — delete button
  document.querySelectorAll('#edge-menu .edge-menu-item').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleEdgeMenuAction(btn.dataset.action);
    });
  });

  // Edge menu inputs — prevent mousedown from closing the menu
  document.querySelectorAll('#edge-menu .edge-menu-input').forEach(input => {
    input.addEventListener('mousedown', (e) => e.stopPropagation());
    input.addEventListener('keydown', (e) => {
      e.stopPropagation(); // don't trigger canvas keyboard shortcuts
      if (e.key === 'Enter') closeEdgeMenu();
      if (e.key === 'Escape') {
        // Revert and close
        const menu = document.getElementById('edge-menu');
        menu.classList.remove('open');
        activeEdgeMenuId = null;
      }
    });
  });

  // Close edge menu on any outside click
  window.addEventListener('mousedown', (e) => {
    if (activeEdgeMenuId && !e.target.closest('#edge-menu')) {
      closeEdgeMenu();
    }
  });

  // Chat input: Enter to send, Shift+Enter for newline
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Minimap click-to-jump
  const minimapEl = document.getElementById('minimap');
  minimapEl.addEventListener('click', onMinimapClick);

  // Touch events for mobile
  container.addEventListener('touchstart', onTouchStart, { passive: false });
  container.addEventListener('touchmove', onTouchMove, { passive: false });
  container.addEventListener('touchend', onTouchEnd, { passive: false });

  // Set initial active states
  document.getElementById('btn-physics').classList.add('active');
  document.getElementById('btn-grid').classList.add('active');

  // Try to load saved state
  const loaded = loadState('default');

  if (!loaded) {
    // Create welcome nodes
    const n1 = createNode(300, 200, 'Welcome', 'Double-click the canvas to create nodes.\nDrag nodes to move them.\nRight-click a node to set it as the focal point.');
    const n2 = createNode(600, 150, 'Gravitational Context', 'Nodes exert gravitational pull on each other based on their mass. Mass grows from content length, nearby connections, and reference count.');
    const n3 = createNode(450, 400, 'AI Integration', 'Set a focal point and open the Chat panel. The AI assembles its context window by weighting nodes based on proximity to your focal point.');

    setFocalNode(n1.id);

    // Center the view
    view.x = 50;
    view.y = 50;
  }

  applyViewTransform();
  mainLoop();
}

init();
</script>
