<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — OK ROBOT</title>
<link rel="icon" type="image/png" href="images/ok_robot_logo_400.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-subtle: #111111;
    --text-primary: #e8e8e8;
    --text-secondary: #888888;
    --text-dim: #555555;
    --accent: #00ff88;
    --accent-dim: #00ff8822;
    --accent-glow: #00ff8844;
    --border: #1a1a1a;
    --font-display: 'Outfit', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 116%;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--text-dim) var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-display);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- NAVIGATION ---- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  }

  .nav-logo {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .nav-logo a { text-decoration: none; }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-left: 2.5rem;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--accent); }
  .nav-links a.active { color: var(--accent); }

  /* ---- PAGE CONTENT ---- */
  .page-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 8rem 3rem 4rem;
  }

  .page-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  .page-title {
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: -0.03em;
    color: #ffffff;
    margin-bottom: 1rem;
  }

  .page-subtitle {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 3rem;
  }

  /* ---- BLOG CARDS ---- */
  .blog-list {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .blog-card {
    display: block;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2rem;
    text-decoration: none;
    transition: border-color 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .blog-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-dim);
    transform: translateY(-2px);
  }

  .blog-card-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .blog-card-date { color: var(--text-secondary); }

  .blog-card-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
  }

  .blog-card-title {
    font-weight: 700;
    font-size: 1.3rem;
    color: #ffffff;
    margin-bottom: 0.5rem;
  }

  .blog-card-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.6;
    font-weight: 300;
  }

  .blog-card-read {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 1rem;
  }

  /* ---- EMPTY STATE ---- */
  .blog-empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* ---- FOOTER ---- */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4rem;
  }

  footer a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.3s;
  }

  footer a:hover { color: var(--accent); }

  /* ---- HAMBURGER ---- */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 101;
  }

  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text-secondary);
    margin: 5px 0;
    transition: all 0.3s;
  }

  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ---- MOBILE ---- */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .hamburger { display: block; }
    .nav-links {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 100;
    }
    .nav-links.open { display: flex; }
    .nav-links a { margin-left: 0; font-size: 1.2rem; }
    .page-content { padding: 6rem 1.5rem 3rem; }
    footer {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem 1.5rem;
    }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo"><a href="index.html"><img src="images/ok_robot_logo_400.png" alt="OK ROBOT" style="height:70px;vertical-align:middle;background:#181818;border-radius:6px;padding:4px;"></a></div>
  <button class="hamburger" onclick="this.classList.toggle('active');document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#mission">Mission</a>
    <a href="index.html#principles">Principles</a>
    <a href="samples.html">Samples</a>
    <a href="blog.html" class="active">Blog</a>
    <a href="index.html#team">Team</a>
    <a href="index.html#cta">Contact</a>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="page-content">
  <div class="page-label">// Blog</div>
  <h1 class="page-title">From the Field</h1>
  <p class="page-subtitle">Lessons, insights, and hard-won knowledge from building AI systems that work.</p>

  <div class="blog-list" id="blogList">
    <div class="blog-empty">Loading posts...</div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div>&copy; 2026 OK ROBOT LLC. All rights reserved.</div>
  <div><a href="mailto:okrobot@bio-teck.com">okrobot@bio-teck.com</a></div>
</footer>

<script>
(async function() {
  const listEl = document.getElementById('blogList');

  try {
    const res = await fetch('blog/posts/index.json');
    const posts = await res.json();

    posts.sort(function(a, b) {
      return new Date(b.date) - new Date(a.date);
    });

    if (posts.length === 0) {
      listEl.innerHTML = '<div class="blog-empty">No posts yet. Check back soon.</div>';
      return;
    }

    listEl.innerHTML = '';

    posts.forEach(function(post) {
      var card = document.createElement('a');
      card.className = 'blog-card';
      card.href = 'blog-post.html?post=' + encodeURIComponent(post.slug);

      var dateObj = new Date(post.date + 'T00:00:00');
      var dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      var tagsHtml = '';
      if (post.tags && post.tags.length) {
        tagsHtml = post.tags.map(function(t) {
          return '<span class="blog-card-tag">' + t + '</span>';
        }).join(' ');
      }

      card.innerHTML =
        '<div class="blog-card-meta">' +
          '<span class="blog-card-date">' + dateStr + '</span>' +
          (post.author ? '<span>' + post.author + '</span>' : '') +
          tagsHtml +
        '</div>' +
        '<div class="blog-card-title">' + post.title + '</div>' +
        '<div class="blog-card-desc">' + post.description + '</div>' +
        '<div class="blog-card-read">Read more &rarr;</div>';

      listEl.appendChild(card);
    });
  } catch (e) {
    listEl.innerHTML = '<div class="blog-empty">Could not load posts.</div>';
  }
})();
</script>

</body>
</html>
